volumes:
  project_evelynn_db_data:
services:
  db:
    image: postgres:17
    env_file: ./.env
    volumes:
      - project_evelynn_db_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
  server:
    build: ./server
    env_file: ./.env
    depends_on:
      - db
    ports:
      - 8080:8080
